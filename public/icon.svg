<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1e1b4b"/>

  <!-- ── Piano keyboard ── 5 white keys centered, big -->
  <!-- 5 white keys × 68px wide + 4 gaps × 6px = 340 + 24 = 364px -->
  <!-- start x = (512-364)/2 = 74, y = 260, height = 200 -->
  <rect x="74"  y="255" width="68" height="200" rx="10" fill="#f8fafc"/>
  <rect x="148" y="255" width="68" height="200" rx="10" fill="#f8fafc"/>
  <rect x="222" y="255" width="68" height="200" rx="10" fill="#f8fafc"/>
  <rect x="296" y="255" width="68" height="200" rx="10" fill="#f8fafc"/>
  <rect x="370" y="255" width="68" height="200" rx="10" fill="#f8fafc"/>

  <!-- Dividers between white keys -->
  <rect x="144" y="255" width="4" height="200" fill="#1e1b4b"/>
  <rect x="218" y="255" width="4" height="200" fill="#1e1b4b"/>
  <rect x="292" y="255" width="4" height="200" fill="#1e1b4b"/>
  <rect x="366" y="255" width="4" height="200" fill="#1e1b4b"/>

  <!-- Black keys (C# D# — gap — F# G# — gap) centered on gaps between white keys -->
  <!-- C# center between key1 and key2: 74+68=142, gap center=144, black key x=144-22=122 -->
  <rect x="114" y="255" width="44" height="130" rx="8" fill="#1e293b"/>
  <!-- D# between key2 and key3: 148+68=216, gap=218, x=218-22=196 -->
  <rect x="188" y="255" width="44" height="130" rx="8" fill="#1e293b"/>
  <!-- F# between key3 and key4: 222+68=290, gap=292, x=292-22=270 — actually no, let me redo -->
  <!-- key3=222, key4=296: gap between them at x=292, black key x=292-22=270 -->
  <rect x="262" y="255" width="44" height="130" rx="8" fill="#1e293b"/>
  <!-- G# between key4 and key5: key4=296, key5=370, gap at x=366, x=366-22=344 -->
  <rect x="336" y="255" width="44" height="130" rx="8" fill="#1e293b"/>

  <!-- Keyboard top cap -->
  <rect x="72" y="248" width="368" height="14" rx="7" fill="#334155"/>

  <!-- ── Quarter note symbol ── -->
  <!-- Note head: filled oval, tilted -->
  <ellipse cx="210" cy="158" rx="44" ry="30" fill="#818cf8" transform="rotate(-20 210 158)"/>
  <!-- Stem -->
  <rect x="248" y="52" width="16" height="118" rx="8" fill="#818cf8"/>

</svg>
